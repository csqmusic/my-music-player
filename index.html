<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>酥青 · 私人音乐播放器</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升拖动体验，但文本可选不影响 */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #19213c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        /* 登录面板 & 播放器面板公共卡片风格 */
        .glass-card {
            background: rgba(20, 28, 40, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 1.8rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        /* ========== 登录界面 移动端优化 ========== */
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            padding: 1.8rem 1.5rem;
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }
        .login-container h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(120deg, #e0e7ff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
        }
        .login-container p {
            color: #9ca3af;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }
        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
        }
        .input-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.2rem;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.3);
        }
        .login-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(95deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
        }
        .demo-tip {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #6b7280;
        }

        /* 主播放器 */
        .music-player {
            display: none;
            width: 100%;
            max-width: 1300px;
            min-height: 620px;
            backdrop-filter: blur(20px);
            border-radius: 1.8rem;
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }
        .player-grid {
            display: flex;
            flex-wrap: wrap;
            height: 100%;
        }
        /* 左侧歌单栏 */
        .playlist-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            padding: 1.2rem 0.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem 0.8rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1rem;
        }
        .playlist-header h3 {
            color: #f0f3ff;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .logout-icon {
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            padding: 6px;
        }
        .logout-icon:hover {
            color: #f87171;
        }
        .song-list {
            list-style: none;
            max-height: 480px;
            overflow-y: auto;
            padding: 0 0.5rem;
        }
        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 0.8rem;
            margin-bottom: 6px;
            border-radius: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
        }
        .song-item:active {
            background: rgba(129, 140, 248, 0.3);
            transform: scale(0.98);
        }
        .song-item.active {
            background: linear-gradient(95deg, rgba(79, 70, 229, 0.6), rgba(99, 102, 241, 0.4));
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .song-cover-small {
            width: 44px;
            height: 44px;
            background: #2d3748;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a5b4fc;
            font-size: 1.3rem;
        }
        .song-info {
            flex: 1;
        }
        .song-title {
            font-weight: 600;
            color: #eef2ff;
            font-size: 0.95rem;
        }
        .song-artist {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        /* 右侧主内容区 */
        .main-panel {
            flex: 1;
            padding: 1.5rem 1.2rem 1.2rem;
            display: flex;
            flex-direction: column;
        }
        .now-playing-card {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-bottom: 1.2rem;
        }
        .cover-art {
            width: 90px;
            height: 90px;
            background: radial-gradient(circle at 30% 20%, #2d3a5e, #0f172a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            color: #818cf8;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }
        .track-artist {
            color: #b9c2d4;
            margin-top: 4px;
            font-size: 0.85rem;
        }
        /* 控制条 */
        .controls {
            background: rgba(0,0,0,0.35);
            border-radius: 1.8rem;
            padding: 0.8rem 1rem;
            margin: 0.5rem 0 1rem;
        }
        .playback-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.8rem;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 1.8rem;
            cursor: pointer;
            transition: 0.2s;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:active {
            background: rgba(255,255,255,0.15);
            transform: scale(0.96);
        }
        .play-btn {
            background: white;
            color: #1e293b;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            width: 60px;
            height: 60px;
            font-size: 2rem;
        }
        .progress-area {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.7rem;
            color: #cbd5e1;
            margin-bottom: 0.6rem;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            border-radius: 10px;
        }
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }
        .volume-slider {
            width: 100px;
            height: 5px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-fill {
            width: 80%;
            height: 100%;
            background: #a78bfa;
            border-radius: 5px;
        }
        /* 歌词区域 */
        .lyrics-container {
            background: rgba(0,0,0,0.35);
            border-radius: 1.5rem;
            padding: 0.8rem 1rem;
            flex: 1;
            min-height: 180px;
            max-height: 260px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .lyrics-title {
            font-size: 0.75rem;
            color: #9ca3af;
            letter-spacing: 1px;
            margin-bottom: 10px;
            border-left: 3px solid #818cf8;
            padding-left: 10px;
        }
        .lyric-line {
            padding: 6px 10px;
            font-size: 0.9rem;
            color: #cbd5e6;
            transition: all 0.2s;
            border-radius: 30px;
            line-height: 1.4;
        }
        .lyric-line.active {
            color: #f0f3ff;
            font-weight: 600;
            background: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 移动端专项适配 (屏幕宽度 ≤ 640px) ========== */
        @media (max-width: 640px) {
            body {
                padding: 12px;
            }
            .login-container {
                padding: 1.5rem 1.2rem;
                max-width: 95%;
            }
            .login-container h1 {
                font-size: 1.6rem;
                white-space: normal;
                word-break: keep-all;
            }
            .login-container p {
                font-size: 0.8rem;
            }
            .input-group input {
                padding: 0.7rem 0.9rem;
                font-size: 0.95rem;
            }
            .login-btn {
                padding: 0.7rem;
                font-size: 0.95rem;
            }
            .playlist-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                max-height: 260px;
                overflow-y: auto;
                padding: 1rem 0.3rem;
            }
            .player-grid {
                flex-direction: column;
            }
            .main-panel {
                padding: 1rem;
            }
            .now-playing-card {
                gap: 1rem;
                margin-bottom: 0.8rem;
            }
            .cover-art {
                width: 70px;
                height: 70px;
                font-size: 2.2rem;
                border-radius: 20px;
            }
            .track-name {
                font-size: 1.2rem;
            }
            .track-artist {
                font-size: 0.75rem;
            }
            .controls {
                padding: 0.6rem 0.8rem;
            }
            .playback-buttons {
                gap: 1rem;
            }
            .ctrl-btn {
                width: 44px;
                height: 44px;
                font-size: 1.5rem;
            }
            .play-btn {
                width: 52px;
                height: 52px;
                font-size: 1.7rem;
            }
            .progress-area {
                gap: 8px;
                font-size: 0.65rem;
            }
            .volume-slider {
                width: 80px;
            }
            .lyrics-container {
                min-height: 150px;
                max-height: 220px;
                padding: 0.6rem 0.8rem;
            }
            .lyric-line {
                font-size: 0.85rem;
                padding: 5px 8px;
            }
            .song-item {
                padding: 0.7rem 0.6rem;
                gap: 10px;
            }
            .song-cover-small {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .song-title {
                font-size: 0.85rem;
            }
            .song-artist {
                font-size: 0.7rem;
            }
        }

        /* 极小屏幕 (宽度 ≤ 380px) 进一步紧凑 */
        @media (max-width: 380px) {
            .login-container {
                padding: 1.2rem 1rem;
            }
            .track-name {
                font-size: 1rem;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1.3rem;
            }
            .play-btn {
                width: 48px;
                height: 48px;
                font-size: 1.5rem;
            }
            .volume-slider {
                width: 70px;
            }
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginContainer" class="glass-card login-container">
    <h1><i class="fas fa-headphones"></i> 酥青·音乐</h1>
    <p>登录后畅享私人歌单</p>
    <div class="input-group">
        <label><i class="fas fa-user"></i> 用户名</label>
        <input type="text" id="username" placeholder="任意昵称" autocomplete="off">
    </div>
    <div class="input-group">
        <label><i class="fas fa-lock"></i> 密码</label>
        <input type="password" id="password" placeholder="随意输入即可">
    </div>
    <button class="login-btn" id="doLoginBtn"><i class="fas fa-music"></i> 进入音乐世界</button>
    <div class="demo-tip">✨ 演示登录：任意账号/密码 点击即可</div>
</div>

<!-- 主播放器界面 -->
<div id="musicPlayer" class="music-player glass-card">
    <div class="player-grid">
        <!-- 左侧歌单区域 -->
        <div class="playlist-panel">
            <div class="playlist-header">
                <h3><i class="fas fa-list-ul"></i> 我的歌单</h3>
                <i class="fas fa-sign-out-alt logout-icon" id="logoutBtn"></i>
            </div>
            <ul class="song-list" id="songList">
                <!-- 动态歌单渲染 -->
            </ul>
        </div>
        <!-- 右侧主内容 -->
        <div class="main-panel">
            <div class="now-playing-card">
                <div class="cover-art">
                    <i class="fas fa-compact-disc"></i>
                </div>
                <div class="track-info">
                    <div class="track-name" id="currentSongTitle">未选择歌曲</div>
                    <div class="track-artist" id="currentArtist">--</div>
                </div>
            </div>
            <div class="controls">
                <div class="playback-buttons">
                    <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                    <button class="ctrl-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                    <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                </div>
                <div class="progress-area">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-filled" id="progressFilled"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
                <div class="volume-wrap">
                    <i class="fas fa-volume-down" style="color:#cbd5e6"></i>
                    <div class="volume-slider" id="volumeBar">
                        <div class="volume-fill" id="volumeFill"></div>
                    </div>
                    <i class="fas fa-volume-up" style="color:#cbd5e6"></i>
                </div>
            </div>
            <!-- 歌词显示区域 -->
            <div class="lyrics-container" id="lyricsPanel">
                <div class="lyrics-title"><i class="fas fa-microphone-alt"></i> 滚动歌词 · 沉浸体验</div>
                <div id="lyricsContent">
                    <div class="lyric-line">✨ 选择一首歌曲，开始聆听 ✨</div>
                </div>
            </div>
        </div>
    </div>
</div>

    // ---------- 全局变量 ----------
    let currentSongIndex = 0;
    let audio = new Audio();
    let isPlaying = false;
    let currentLyrics = [];
    let isLoggedIn = false;

    // DOM 元素
    const loginContainer = document.getElementById('loginContainer');
    const musicPlayerDiv = document.getElementById('musicPlayer');
    const songListEl = document.getElementById('songList');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeBar = document.getElementById('volumeBar');
    const volumeFill = document.getElementById('volumeFill');
    const currentSongTitleSpan = document.getElementById('currentSongTitle');
    const currentArtistSpan = document.getElementById('currentArtist');
    const lyricsContentDiv = document.getElementById('lyricsContent');
    const logoutBtn = document.getElementById('logoutBtn');

    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const parsed = [];
        const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            const match = line.match(timeRegex);
            if (match) {
                const minutes = parseInt(match[1], 10);
                const seconds = parseInt(match[2], 10);
                const millis = parseInt(match[3], 10);
                let timeSec = minutes * 60 + seconds + millis / 1000;
                const text = line.replace(timeRegex, '').trim();
                if (text) {
                    parsed.push({ time: timeSec, text: text });
                }
            }
        }
        parsed.sort((a,b) => a.time - b.time);
        return parsed;
    }

    function loadSong(index) {
        if (index < 0) index = 0;
        if (index >= SONGS.length) index = 0;
        currentSongIndex = index;
        const song = SONGS[currentSongIndex];
        currentSongTitleSpan.innerText = song.name;
        currentArtistSpan.innerText = song.artist;
        const wasPlaying = isPlaying;
        audio.pause();
        audio.src = song.src;
        audio.load();
        currentLyrics = parseLRC(song.lrc);
        renderLyrics(0);
        progressFilled.style.width = '0%';
        currentTimeSpan.innerText = '0:00';
        durationSpan.innerText = '0:00';
        
        if (wasPlaying) {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(() => {
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            }
        } else {
            isPlaying = false;
            updatePlayButtonIcon(false);
        }
        
        highlightActiveSong();
        audio.onloadedmetadata = () => {
            if (!isNaN(audio.duration)) {
                durationSpan.innerText = formatTime(audio.duration);
            }
        };
    }

    function updateLyricsByTime(currentTime) {
        if (!currentLyrics.length) {
            if (lyricsContentDiv.innerHTML.trim() === '' || lyricsContentDiv.children.length === 0) {
                lyricsContentDiv.innerHTML = '<div class="lyric-line">🎵 暂无滚动歌词，享受旋律吧 🎵</div>';
            }
            return;
        }
        let activeIndex = -1;
        for (let i = 0; i < currentLyrics.length; i++) {
            if (currentTime >= currentLyrics[i].time) {
                activeIndex = i;
            } else {
                break;
            }
        }
        if (activeIndex === -1 && currentLyrics.length > 0 && currentTime < currentLyrics[0].time) {
            activeIndex = 0;
        }
        renderLyrics(activeIndex);
    }
    
    function renderLyrics(activeIndex) {
        if (!currentLyrics.length) {
            lyricsContentDiv.innerHTML = '<div class="lyric-line">✨ 纯音乐 / 无歌词 ✨</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < currentLyrics.length; i++) {
            const line = currentLyrics[i].text;
            const activeClass = (i === activeIndex) ? 'active' : '';
            html += `<div class="lyric-line ${activeClass}" data-line-index="${i}">${escapeHtml(line)}</div>`;
        }
        lyricsContentDiv.innerHTML = html;
        if (activeIndex >= 0) {
            const activeElement = lyricsContentDiv.querySelector(`.lyric-line.active`);
            if (activeElement) {
                activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function togglePlayPause() {
        if (audio.src === '') {
            loadSong(currentSongIndex);
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            updatePlayButtonIcon(false);
        } else {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(err => {
                    console.warn("播放失败:", err);
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            }
        }
    }
    
    function updatePlayButtonIcon(playing) {
        if (playing) {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    }
    
    function nextSong() {
        let newIndex = (currentSongIndex + 1) % SONGS.length;
        loadSong(newIndex);
        audio.play().then(() => {
            isPlaying = true;
            updatePlayButtonIcon(true);
        }).catch(() => {
            isPlaying = false;
            updatePlayButtonIcon(false);
        });
    }
    
    function prevSong() {
        let newIndex = (currentSongIndex - 1 + SONGS.length) % SONGS.length;
        loadSong(newIndex);
        audio.play().then(() => {
            isPlaying = true;
            updatePlayButtonIcon(true);
        }).catch(() => {
            isPlaying = false;
            updatePlayButtonIcon(false);
        });
    }
    
    function setProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let clickX = e.clientX - rect.left;
        let percent = clickX / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration && !isNaN(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }
    
    function setVolume(e) {
        const rect = volumeBar.getBoundingClientRect();
        let clickX = e.clientX - rect.left;
        let vol = clickX / rect.width;
        vol = Math.min(1, Math.max(0, vol));
        audio.volume = vol;
        volumeFill.style.width = (vol * 100) + '%';
    }
    
    function initVolume() {
        audio.volume = 0.7;
        volumeFill.style.width = '70%';
    }
    
    function renderPlaylist() {
        songListEl.innerHTML = '';
        SONGS.forEach((song, idx) => {
            const li = document.createElement('li');
            li.className = 'song-item';
            if (idx === currentSongIndex) li.classList.add('active');
            li.innerHTML = `
                <div class="song-cover-small"><i class="fas fa-music"></i></div>
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.name)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                </div>
            `;
            li.addEventListener('click', () => {
                if (currentSongIndex === idx && audio.src && audio.src.includes(song.src)) {
                    if (!isPlaying) togglePlayPause();
                    return;
                }
                loadSong(idx);
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(() => {
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            });
            songListEl.appendChild(li);
        });
    }
    
    function highlightActiveSong() {
        const items = document.querySelectorAll('.song-item');
        items.forEach((item, idx) => {
            if (idx === currentSongIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    function bindAudioEvents() {
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeSpan.innerText = formatTime(audio.currentTime);
                updateLyricsByTime(audio.currentTime);
            }
        });
        audio.addEventListener('ended', () => {
            nextSong();
        });
        audio.addEventListener('canplay', () => {
            if (!isNaN(audio.duration)) durationSpan.innerText = formatTime(audio.duration);
        });
    }
    
    function logout() {
        isLoggedIn = false;
        audio.pause();
        isPlaying = false;
        loginContainer.style.display = 'flex';
        musicPlayerDiv.style.display = 'none';
        sessionStorage.removeItem('musicLogged');
    }
    
    function login(username, password) {
        if (username === "suqing" && password === "suqing") {
            isLoggedIn = true;
            sessionStorage.setItem('musicLogged', 'true');
            loginContainer.style.display = 'none';
            musicPlayerDiv.style.display = 'block';
            if (!audio.src) {
                loadSong(0);
            } else {
                highlightActiveSong();
                renderPlaylist();
            }
            renderPlaylist();
            bindAudioEvents();
            initVolume();
            if (currentLyrics.length === 0 && SONGS[currentSongIndex]) {
                const initLrc = parseLRC(SONGS[currentSongIndex].lrc);
                currentLyrics = initLrc;
                renderLyrics(0);
            }
            updateLyricsByTime(0);
            return true;
        }
        alert("用户名或密码错误");
        return false;
    }
    
    function bindControls() {
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        progressBar.addEventListener('click', setProgress);
        volumeBar.addEventListener('click', setVolume);
        logoutBtn.addEventListener('click', logout);
        document.getElementById('doLoginBtn').addEventListener('click', () => {
            const user = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            login(user, pwd);
        });
        const pwdInput = document.getElementById('password');
        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('doLoginBtn').click();
            }
        });
    }
    
    function checkAutoLogin() {
        if (sessionStorage.getItem('musicLogged') === 'true') {
            document.getElementById('username').value = "suqing";
            document.getElementById('password').value = "suqing";
            login("suqing", "suqing");
        } else {
            loginContainer.style.display = 'flex';
            musicPlayerDiv.style.display = 'none';
        }
    }
    
    function init() {
        bindControls();
        checkAutoLogin();
    }
    init();
</script>
</body>
</html>
