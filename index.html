<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>酥青 · 私人音乐播放器</title>
    <!-- Font Awesome 6 (免费图标库) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 提升拖动体验，但文本可选不影响 */
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0b1120 0%, #19213c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 登录面板 & 播放器面板公共卡片风格 */
        .glass-card {
            background: rgba(20, 28, 40, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        /* 登录界面 */
        .login-container {
            width: 100%;
            max-width: 420px;
            min-width: 280px;
            padding: 2.2rem 1.5rem;
            text-align: center;
            box-sizing: border-box;
            animation: fadeInUp 0.5s ease;
        }
        .login-container h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(120deg, #e0e7ff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .login-container p {
            color: #9ca3af;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #cbd5e6;
        }
        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 1.2rem;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: all 0.2s;
        }
        .input-group input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 2px rgba(129, 140, 248, 0.3);
        }
        .login-btn {
            width: 100%;
            padding: 0.9rem;
            box-sizing: border-box;
            background: linear-gradient(95deg, #4f46e5, #6366f1);
            border: none;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
        }
        .demo-tip {
            margin-top: 1.5rem;
            font-size: 0.75rem;
            color: #6b7280;
        }

        /* 主播放器 (初始隐藏) */
        .music-player {
            display: none;
            width: 1300px;
            max-width: 98vw;
            min-height: 620px;
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            overflow: hidden;
            animation: fadeInUp 0.5s ease;
        }
        .player-grid {
            display: flex;
            flex-wrap: wrap;
            height: 100%;
        }
        /* 左侧歌单栏 */
        .playlist-panel {
            width: 280px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            padding: 1.5rem 0.8rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0 1rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 1.2rem;
        }
        .playlist-header h3 {
            color: #f0f3ff;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .logout-icon {
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .logout-icon:hover {
            color: #f87171;
        }
        .song-list {
            list-style: none;
            max-height: 480px;
            overflow-y: auto;
            padding: 0 0.5rem;
        }
        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 1rem;
            margin-bottom: 6px;
            border-radius: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
        }
        .song-item:hover {
            background: rgba(129, 140, 248, 0.2);
        }
        .song-item.active {
            background: linear-gradient(95deg, rgba(79, 70, 229, 0.6), rgba(99, 102, 241, 0.4));
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .song-cover-small {
            width: 40px;
            height: 40px;
            background: #2d3748;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #a5b4fc;
            font-size: 1.2rem;
        }
        .song-info {
            flex: 1;
        }
        .song-title {
            font-weight: 600;
            color: #eef2ff;
            font-size: 0.9rem;
        }
        .song-artist {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        /* 右侧主内容区 */
        .main-panel {
            flex: 1;
            padding: 2rem 2rem 1.8rem;
            display: flex;
            flex-direction: column;
        }
        .now-playing-card {
            display: flex;
            align-items: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .cover-art {
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 30% 20%, #2d3a5e, #0f172a);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: #818cf8;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.4);
        }
        .track-info {
            flex: 1;
        }
        .track-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }
        .track-artist {
            color: #b9c2d4;
            margin-top: 6px;
        }
        /* 控制条 */
        .controls {
            background: rgba(0,0,0,0.35);
            border-radius: 2rem;
            padding: 1rem 1.5rem;
            margin: 1rem 0 1.5rem;
        }
        .playback-buttons {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.8rem;
            margin-bottom: 1rem;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: #e2e8f0;
            font-size: 1.6rem;
            cursor: pointer;
            transition: 0.2s;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
        }
        .play-btn {
            background: white;
            color: #1e293b;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
        }
        .play-btn:hover {
            transform: scale(1.08);
        }
        .progress-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.75rem;
            color: #cbd5e1;
        }
        .progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            border-radius: 10px;
            position: relative;
        }
        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .volume-slider {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            cursor: pointer;
        }
        .volume-fill {
            width: 80%;
            height: 100%;
            background: #a78bfa;
            border-radius: 5px;
        }
        /* 歌词区域 */
        .lyrics-container {
            background: rgba(0,0,0,0.35);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            flex: 1;
            min-height: 200px;
            max-height: 280px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        .lyrics-title {
            font-size: 0.8rem;
            color: #9ca3af;
            letter-spacing: 1px;
            margin-bottom: 12px;
            border-left: 3px solid #818cf8;
            padding-left: 10px;
        }
        .lyric-line {
            padding: 8px 12px;
            font-size: 0.95rem;
            color: #cbd5e6;
            transition: all 0.2s;
            border-radius: 40px;
            line-height: 1.4;
        }
        .lyric-line.active {
            color: #f0f3ff;
            font-weight: 600;
            background: rgba(129, 140, 248, 0.3);
            transform: scale(1.02);
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6366f1;
            border-radius: 10px;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @media (max-width: 780px) {
            .playlist-panel {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                max-height: 280px;
                overflow-y: auto;
            }
            .player-grid {
                flex-direction: column;
            }
            .track-name {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<!-- 登录界面 -->
<div id="loginContainer" class="glass-card login-container">
    <h1><i class="fas fa-headphones"></i> 酥青·音乐</h1>
    <p>登录后畅享私人歌单</p>
    <div class="input-group">
        <label><i class="fas fa-user"></i> 用户名</label>
        <input type="text" id="username" placeholder="任意昵称" autocomplete="off">
    </div>
    <div class="input-group">
        <label><i class="fas fa-lock"></i> 密码</label>
        <input type="password" id="password" placeholder="随意输入即可">
    </div>
    <button class="login-btn" id="doLoginBtn"><i class="fas fa-music"></i> 进入音乐世界</button>
    <div class="demo-tip">✨ 演示登录：任意账号/密码 点击即可</div>
</div>

<!-- 主播放器界面 -->
<div id="musicPlayer" class="music-player glass-card">
    <div class="player-grid">
        <!-- 左侧歌单区域 -->
        <div class="playlist-panel">
            <div class="playlist-header">
                <h3><i class="fas fa-list-ul"></i> 我的歌单</h3>
                <i class="fas fa-sign-out-alt logout-icon" id="logoutBtn"></i>
            </div>
            <ul class="song-list" id="songList">
                <!-- 动态歌单渲染 -->
            </ul>
        </div>
        <!-- 右侧主内容 -->
        <div class="main-panel">
            <div class="now-playing-card">
                <div class="cover-art">
                    <i class="fas fa-compact-disc"></i>
                </div>
                <div class="track-info">
                    <div class="track-name" id="currentSongTitle">未选择歌曲</div>
                    <div class="track-artist" id="currentArtist">--</div>
                </div>
            </div>
            <div class="controls">
                <div class="playback-buttons">
                    <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward-step"></i></button>
                    <button class="ctrl-btn play-btn" id="playPauseBtn"><i class="fas fa-play"></i></button>
                    <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward-step"></i></button>
                </div>
                <div class="progress-area">
                    <span id="currentTime">0:00</span>
                    <div class="progress-bar" id="progressBar">
                        <div class="progress-filled" id="progressFilled"></div>
                    </div>
                    <span id="duration">0:00</span>
                </div>
                <div class="volume-wrap">
                    <i class="fas fa-volume-down" style="color:#cbd5e6"></i>
                    <div class="volume-slider" id="volumeBar">
                        <div class="volume-fill" id="volumeFill"></div>
                    </div>
                    <i class="fas fa-volume-up" style="color:#cbd5e6"></i>
                </div>
            </div>
            <!-- 歌词显示区域 -->
            <div class="lyrics-container" id="lyricsPanel">
                <div class="lyrics-title"><i class="fas fa-microphone-alt"></i> 滚动歌词 · 沉浸体验</div>
                <div id="lyricsContent">
                    <div class="lyric-line">✨ 选择一首歌曲，开始聆听 ✨</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 歌曲库数据 (包含歌曲地址、歌词LRC) ----------
    // 使用 SoundHelix 测试音频 (公开无版权限制，仅用于技术演示)
    const SONGS = [
        {
            id: 0,
            name: "藏起的幸福",
            artist: "花开大人",
            src: "https://raw.githubusercontent.com/csqmusic/my-music-player/refs/heads/main/藏起的幸福.mp3",
            lrc: `[00:00.00]晨曦微光 洒落窗台
[00:08.50]梦中旋律 轻轻徘徊
[00:16.00]漫步云端 风吹过耳畔
[00:24.20]这一刻世界 如此简单
[00:32.40]听见花开的声音 绽放绚烂
[00:40.90]跟随节拍 尽情释怀
[00:49.00]旅途的尽头 有星辰大海
[00:57.30]继续前行 不再孤单
[01:05.80]晨曦的梦境 温柔期待
[01:14.00]拥抱所有 美好未来`
        },
        {
            id: 1,
            name: "温柔的晚安",
            artist: "花开大人",
            src: "https://raw.githubusercontent.com/csqmusic/my-music-player/refs/heads/main/温柔的晚安%20(1).mp3",
            lrc: `[00:00.00]霓虹灯闪烁 城市的脉搏
[00:07.20]节奏跳动 夜色迷惑
[00:14.80]穿梭在街头 自由的风
[00:22.50]忘掉烦恼 这一刻放纵
[00:30.30]电音涌动 灵魂失重
[00:38.00]舞池中央 忘记时空
[00:45.70]让心跳 跟随低音共鸣
[00:53.20]整夜狂欢 直到天明
[01:01.00]霓虹夜曲 永不终结
[01:08.80]梦境与现实 模糊了边界`
        },
        {
            id: 2,
            name: "慢慢来",
            artist: "花开大人",
            src: "https://raw.githubusercontent.com/csqmusic/my-music-player/refs/heads/main/慢慢来.mp3",
            lrc: `[00:00.00]青石小径 落叶纷飞
[00:09.30]阳光透过 树梢的间隙
[00:18.00]鸟儿轻唱 溪水潺潺
[00:26.20]深呼吸 自然的香气
[00:34.50]放下行囊 听风的故事
[00:43.00]每一片叶子 都有回忆
[00:51.20]森林漫游 忘记时间
[00:59.40]返璞归真 简单如初
[01:08.00]感受大地的温暖呼吸
[01:16.20]让心自由 回归宁静`
        }
    ];

    // ---------- 全局变量 ----------
    let currentSongIndex = 0;          // 当前播放歌曲索引
    let audio = new Audio();            // 主音频元素
    let isPlaying = false;
    let currentLyrics = [];             // [{time, text}]
    let updateTimer = null;             // requestAnimationFrame or timeupdate 监听
    let isLoggedIn = false;

    // DOM 元素
    const loginContainer = document.getElementById('loginContainer');
    const musicPlayerDiv = document.getElementById('musicPlayer');
    const songListEl = document.getElementById('songList');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    const progressFilled = document.getElementById('progressFilled');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const volumeBar = document.getElementById('volumeBar');
    const volumeFill = document.getElementById('volumeFill');
    const currentSongTitleSpan = document.getElementById('currentSongTitle');
    const currentArtistSpan = document.getElementById('currentArtist');
    const lyricsContentDiv = document.getElementById('lyricsContent');
    const logoutBtn = document.getElementById('logoutBtn');

    // 辅助函数: 时间格式化 mm:ss
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' + secs : secs}`;
    }

    // 解析LRC文本 -> 返回数组 [{time, text}]
    function parseLRC(lrcText) {
        const lines = lrcText.split('\n');
        const parsed = [];
        const timeRegex = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            const match = line.match(timeRegex);
            if (match) {
                const minutes = parseInt(match[1], 10);
                const seconds = parseInt(match[2], 10);
                const millis = parseInt(match[3], 10);
                let timeSec = minutes * 60 + seconds + millis / 1000;
                const text = line.replace(timeRegex, '').trim();
                if (text) {
                    parsed.push({ time: timeSec, text: text });
                }
            } else {
                // 没有时间标签的文本忽略或者作为默认？忽略
            }
        }
        // 按时间排序
        parsed.sort((a,b) => a.time - b.time);
        return parsed;
    }

    // 加载歌曲: 切换src, 更新UI, 解析歌词
    function loadSong(index) {
        if (index < 0) index = 0;
        if (index >= SONGS.length) index = 0;
        currentSongIndex = index;
        const song = SONGS[currentSongIndex];
        // 更新UI文本
        currentSongTitleSpan.innerText = song.name;
        currentArtistSpan.innerText = song.artist;
        // 切换音频源
        const wasPlaying = isPlaying;
        audio.pause();
        audio.src = song.src;
        audio.load();
        // 解析歌词
        currentLyrics = parseLRC(song.lrc);
        renderLyrics(0); // 重置歌词显示，高亮第0行或占位
        // 重置进度条
        progressFilled.style.width = '0%';
        currentTimeSpan.innerText = '0:00';
        durationSpan.innerText = '0:00';
        
        // 如果加载前正在播放，则自动播放 (由于load后需要等待canplay, 但为了手势限制, 调用play)
        if (wasPlaying) {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(() => {
                    // 自动播放被阻止，暂停状态
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            }
        } else {
            isPlaying = false;
            updatePlayButtonIcon(false);
        }
        
        // 更新歌单高亮
        highlightActiveSong();
        // 获取总时长后更新
        audio.onloadedmetadata = () => {
            if (!isNaN(audio.duration)) {
                durationSpan.innerText = formatTime(audio.duration);
            }
        };
    }

    // 根据当前播放时间更新歌词高亮
    function updateLyricsByTime(currentTime) {
        if (!currentLyrics.length) {
            if (lyricsContentDiv.innerHTML.trim() === '' || lyricsContentDiv.children.length === 0) {
                lyricsContentDiv.innerHTML = '<div class="lyric-line">🎵 暂无滚动歌词，享受旋律吧 🎵</div>';
            }
            return;
        }
        let activeIndex = -1;
        for (let i = 0; i < currentLyrics.length; i++) {
            if (currentTime >= currentLyrics[i].time) {
                activeIndex = i;
            } else {
                break;
            }
        }
        if (activeIndex === -1 && currentLyrics.length > 0 && currentTime < currentLyrics[0].time) {
            activeIndex = 0;
        }
        renderLyrics(activeIndex);
    }
    
    // 渲染歌词面板，高亮某一行并自动滚动
    function renderLyrics(activeIndex) {
        if (!currentLyrics.length) {
            lyricsContentDiv.innerHTML = '<div class="lyric-line">✨ 纯音乐 / 无歌词 ✨</div>';
            return;
        }
        let html = '';
        for (let i = 0; i < currentLyrics.length; i++) {
            const line = currentLyrics[i].text;
            const activeClass = (i === activeIndex) ? 'active' : '';
            html += `<div class="lyric-line ${activeClass}" data-line-index="${i}">${escapeHtml(line)}</div>`;
        }
        lyricsContentDiv.innerHTML = html;
        if (activeIndex >= 0) {
            const activeElement = lyricsContentDiv.querySelector(`.lyric-line.active`);
            if (activeElement) {
                activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
    }
    
    // 简单防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 播放/暂停切换
    function togglePlayPause() {
        if (audio.src === '') {
            loadSong(currentSongIndex);
        }
        if (isPlaying) {
            audio.pause();
            isPlaying = false;
            updatePlayButtonIcon(false);
        } else {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(err => {
                    console.warn("播放失败:", err);
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            }
        }
    }
    
    function updatePlayButtonIcon(playing) {
        if (playing) {
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
        } else {
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
    }
    
    // 下一首
    function nextSong() {
        let newIndex = (currentSongIndex + 1) % SONGS.length;
        loadSong(newIndex);
        // 自动播放(手势触发，可以播放)
        audio.play().then(() => {
            isPlaying = true;
            updatePlayButtonIcon(true);
        }).catch(() => {
            isPlaying = false;
            updatePlayButtonIcon(false);
        });
    }
    
    function prevSong() {
        let newIndex = (currentSongIndex - 1 + SONGS.length) % SONGS.length;
        loadSong(newIndex);
        audio.play().then(() => {
            isPlaying = true;
            updatePlayButtonIcon(true);
        }).catch(() => {
            isPlaying = false;
            updatePlayButtonIcon(false);
        });
    }
    
    // 进度条拖动
    function setProgress(e) {
        const rect = progressBar.getBoundingClientRect();
        let clickX = e.clientX - rect.left;
        let percent = clickX / rect.width;
        percent = Math.min(1, Math.max(0, percent));
        if (audio.duration && !isNaN(audio.duration)) {
            audio.currentTime = percent * audio.duration;
        }
    }
    
    // 音量控制
    function setVolume(e) {
        const rect = volumeBar.getBoundingClientRect();
        let clickX = e.clientX - rect.left;
        let vol = clickX / rect.width;
        vol = Math.min(1, Math.max(0, vol));
        audio.volume = vol;
        volumeFill.style.width = (vol * 100) + '%';
    }
    
    // 初始化音量UI
    function initVolume() {
        audio.volume = 0.7;
        volumeFill.style.width = '70%';
    }
    
    // 歌单渲染
    function renderPlaylist() {
        songListEl.innerHTML = '';
        SONGS.forEach((song, idx) => {
            const li = document.createElement('li');
            li.className = 'song-item';
            if (idx === currentSongIndex) li.classList.add('active');
            li.innerHTML = `
                <div class="song-cover-small"><i class="fas fa-music"></i></div>
                <div class="song-info">
                    <div class="song-title">${escapeHtml(song.name)}</div>
                    <div class="song-artist">${escapeHtml(song.artist)}</div>
                </div>
            `;
            li.addEventListener('click', () => {
                if (currentSongIndex === idx && audio.src && audio.src.includes(song.src)) {
                    // 相同歌曲不重新加载，但若暂停则播放
                    if (!isPlaying) togglePlayPause();
                    return;
                }
                loadSong(idx);
                // 用户主动点击歌单后自动播放
                audio.play().then(() => {
                    isPlaying = true;
                    updatePlayButtonIcon(true);
                }).catch(() => {
                    isPlaying = false;
                    updatePlayButtonIcon(false);
                });
            });
            songListEl.appendChild(li);
        });
    }
    
    function highlightActiveSong() {
        const items = document.querySelectorAll('.song-item');
        items.forEach((item, idx) => {
            if (idx === currentSongIndex) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
    }
    
    // 时间更新监听
    function bindAudioEvents() {
        audio.addEventListener('timeupdate', () => {
            if (audio.duration && !isNaN(audio.duration)) {
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeSpan.innerText = formatTime(audio.currentTime);
                updateLyricsByTime(audio.currentTime);
            }
        });
        audio.addEventListener('ended', () => {
            // 自动下一首
            nextSong();
        });
        audio.addEventListener('canplay', () => {
            if (!isNaN(audio.duration)) durationSpan.innerText = formatTime(audio.duration);
        });
    }
    
    // 退出登录
    function logout() {
        isLoggedIn = false;
        audio.pause();
        isPlaying = false;
        loginContainer.style.display = 'flex';
        musicPlayerDiv.style.display = 'none';
        // 清空登录状态
        sessionStorage.removeItem('musicLogged');
    }
    
    // 登录验证
    function login(username, password) {
    if (username === "suqing" && password === "suqing") {
        // 登录成功...
            isLoggedIn = true;
            sessionStorage.setItem('musicLogged', 'true');
            loginContainer.style.display = 'none';
            musicPlayerDiv.style.display = 'block';
            // 初始化播放器核心
            if (!audio.src) {
                loadSong(0);
            } else {
                // 刷新界面歌单高亮
                highlightActiveSong();
                renderPlaylist(); // 重新渲染歌单确保事件
            }
            renderPlaylist();
            bindAudioEvents();
            initVolume();
            // 如果当前无歌词内容 就显示提示
            if (currentLyrics.length === 0 && SONGS[currentSongIndex]) {
                const initLrc = parseLRC(SONGS[currentSongIndex].lrc);
                currentLyrics = initLrc;
                renderLyrics(0);
            }
            updateLyricsByTime(0);
            return true;
        }
        alert("请填写用户名和密码 (即可)");
        return false;
    }
    
    // 事件绑定
    function bindControls() {
        playPauseBtn.addEventListener('click', togglePlayPause);
        prevBtn.addEventListener('click', prevSong);
        nextBtn.addEventListener('click', nextSong);
        progressBar.addEventListener('click', setProgress);
        volumeBar.addEventListener('click', setVolume);
        logoutBtn.addEventListener('click', logout);
        document.getElementById('doLoginBtn').addEventListener('click', () => {
            const user = document.getElementById('username').value;
            const pwd = document.getElementById('password').value;
            login(user, pwd);
        });
        // 允许回车登录
        const pwdInput = document.getElementById('password');
        pwdInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('doLoginBtn').click();
            }
        });
    }
    
    // 检查sessionStorage自动登录
    function checkAutoLogin() {
        if (sessionStorage.getItem('musicLogged') === 'true') {
            // 自动填充演示
            document.getElementById('username').value = "乐迷";
            document.getElementById('password').value = "demo";
            login("乐迷", "demo");
        } else {
            loginContainer.style.display = 'flex';
            musicPlayerDiv.style.display = 'none';
        }
    }
    
    // 初始化
    function init() {
        bindControls();
        checkAutoLogin();
    }
    init();
</script>
</body>
</html>
